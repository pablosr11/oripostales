# OriPostales API — Nginx server block
# File: /etc/nginx/sites-available/oripostales-api
#
# Deploy:
#   sudo cp /home/psiesta11/repositories/oripostales/nginx/oripostales-api.conf \
#            /etc/nginx/sites-available/oripostales-api
#   sudo ln -s /etc/nginx/sites-available/oripostales-api \
#              /etc/nginx/sites-enabled/oripostales-api
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name api.psiesta.com;

    # Security headers
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;

    # Serve uploaded photos directly (static files)
    location /uploads/ {
        alias /home/psiesta11/repositories/oripostales/backend/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        # Only allow image content types
        location ~* \.(jpg|jpeg|png|gif|webp|heic)$ {
            try_files $uri =404;
        }
    }

    # Proxy all /api/* requests to Node.js
    location /api/ {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        # Allow large photo uploads (up to 25 MB)
        client_max_body_size 25M;

        # Stripe webhook needs raw body — no buffering issues
        proxy_request_buffering on;

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }

    # Reject everything else
    location / {
        return 404;
    }
}
